<!DOCTYPE html>
<html>
<head>
  <title>Nikah Invite</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f8f3ea;
      font-family: serif;
    }

    .envelope {
      width: 300px;
      height: 200px;
      background: #d4af37;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 20px;
      cursor: pointer;
      border-radius: 10px;
      transition: 0.5s;
      position: relative;
    }

    .details {
      display: none;
      position: absolute;
      background: white;
      color: black;
      width: 100%;
      height: 100%;
      padding: 20px;
      box-sizing: border-box;
      text-align: center;
    }

    .envelope.open .details {
      display: block;
    }
  </style>
</head>

<body>

<div class="envelope" onclick="openInvite()">
  ✉️ Tap to Open

  <div class="details">
    <h2>Nikah Invitation</h2>
    <p>Date: 10 June 2026</p>
    <p>Time: 5:00 PM</p>
    <p>Venue: Grand Mosque</p>
  </div>
</div>

<script>
function openInvite() {
  document.querySelector(".envelope").classList.toggle("open");
}
</script>

</body>
</html>
